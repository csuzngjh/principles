# Lefthook configuration
# https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.ts"
      run: npx eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  parallel: false
  commands:
    protect-main:
      run: node scripts/protect-branch.cjs
    verify-merge:
      # Canonical merge gate. Keep this in sync with the required CI check.
      run: npm run verify:merge
