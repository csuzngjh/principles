# Lefthook configuration
# https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.ts"
      run: npx eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    protect-main:
      run: node scripts/protect-branch.cjs
    lint:
      # Block lint errors from being pushed (warnings are allowed but should be fixed)
      run: npm run lint --workspace=principles-disciple