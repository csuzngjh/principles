# Lefthook configuration
# https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.ts"
      run: npx eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    protect-main:
      run: node scripts/protect-branch.cjs
    lint-all:
      # Block ANY lint error from being pushed
      run: npx eslint 'packages/**/*.ts' --ignore-pattern '**/*.test.ts' --ignore-pattern '**/*.spec.ts'