# PR 自动标签配置 (labeler v6 格式)
# 根据文件变更自动添加标签

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'docs/**/*'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - '**/package.json'
          - '**/package-lock.json'
          - '**/yarn.lock'
          - '**/pnpm-lock.yaml'

typescript:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.ts'
          - '**/*.tsx'

javascript:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.js'
          - '**/*.jsx'

testing:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.test.ts'
          - '**/*.test.js'
          - '**/*.spec.ts'
          - '**/*.spec.js'
          - 'tests/**/*'

ci-cd:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**/*'
          - '.github/actions/**/*'

plugin:
  - changed-files:
      - any-glob-to-any-file:
          - 'packages/openclaw-plugin/**/*'

installer:
  - changed-files:
      - any-glob-to-any-file:
          - 'packages/create-principles-disciple/**/*'