name: Publish to npm

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        default: 'create-principles-disciple'
        type: choice
        options:
          - create-principles-disciple
          - openclaw-plugin
  # 基于 tag 自动发布
  push:
    tags:
      - 'v*'

jobs:
  determine-package:
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.set-package.outputs.package }}
    steps:
      - name: Determine package from tag
        id: set-package
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "package=${{ github.event.inputs.package }}" >> $GITHUB_OUTPUT
          else
            # 从 tag 提取包名，格式: package@version 或 package-vversion
            TAG="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG" == create-principles-disciple* ]]; then
              echo "package=create-principles-disciple" >> $GITHUB_OUTPUT
            elif [[ "$TAG" == openclaw-plugin* ]]; then
              echo "package=openclaw-plugin" >> $GITHUB_OUTPUT
            else
              # 默认发布 create-principles-disciple
              echo "package=create-principles-disciple" >> $GITHUB_OUTPUT
            fi
          fi

  publish:
    runs-on: ubuntu-latest
    needs: determine-package
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: packages/${{ needs.determine-package.outputs.package }}
        run: npm ci

      - name: Build
        working-directory: packages/${{ needs.determine-package.outputs.package }}
        run: npm run build

      - name: Publish
        working-directory: packages/${{ needs.determine-package.outputs.package }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}