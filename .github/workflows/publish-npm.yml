name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        default: 'principles-disciple'
        type: choice
        options:
          - principles-disciple
          - create-principles-disciple
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    tags:
      - 'principles-disciple-v*'
      - 'create-principles-disciple-v*'
  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - 'packages/openclaw-plugin/**'
      - 'packages/create-principles-disciple/**'

jobs:
  release:
    if: (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine package
        id: package
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pkg=${{ github.event.inputs.package }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pkg=principles-disciple" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: packages/${{ steps.package.outputs.pkg }}
        run: npm ci

      - name: Build
        working-directory: packages/${{ steps.package.outputs.pkg }}
        run: npm run build

      - name: Bump version
        id: version
        working-directory: packages/${{ steps.package.outputs.pkg }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP=${{ github.event.inputs.version_bump }}
          else
            BUMP=patch
          fi
          npm version $BUMP -m "chore(release): %s [skip ci]"
          echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Publish to npm
        working-directory: packages/${{ steps.package.outputs.pkg }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push tag
        run: |
          git push origin ${{ steps.version.outputs.version }}
