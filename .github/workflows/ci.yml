name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run ESLint
        run: npm run lint --if-present

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test --if-present

  build-openclaw-plugin:
    name: Build OpenClaw Plugin
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: packages/openclaw-plugin
        run: npm ci --ignore-scripts

      - name: Build
        working-directory: packages/openclaw-plugin
        run: npm run build

      - name: TypeScript Check
        working-directory: packages/openclaw-plugin
        run: npx tsc --noEmit

      - name: Production Build & Verify
        working-directory: packages/openclaw-plugin
        run: npm run build:production

  test-openclaw-plugin-unit:
    name: Test OpenClaw Plugin (unit)
    runs-on: ubuntu-latest
    needs: build-openclaw-plugin
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: packages/openclaw-plugin
        run: npm ci

      - name: Run unit tests
        working-directory: packages/openclaw-plugin
        run: npm run test:unit

  test-openclaw-plugin-integration:
    name: Test OpenClaw Plugin (integration)
    runs-on: ubuntu-latest
    needs: build-openclaw-plugin
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: packages/openclaw-plugin
        run: npm ci

      - name: Run integration tests
        working-directory: packages/openclaw-plugin
        run: npm run test:integration
